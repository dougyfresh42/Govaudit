name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync-snapshots:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync budget data
        run: npm run sync-all

      - name: Commit new snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots/ data/snapshots.json
          git diff --cached --quiet || git commit -m "chore: sync new budget snapshots [skip ci]"
          git push

  build:
    needs: sync-snapshots
    if: github.event.action != 'closed'
    uses: ./.github/workflows/build.yml
    with:
      base-path: "/${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.pull_request.number }}"
      branch-ref: ${{ github.head_ref }}

  deploy-preview:
    needs: build
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: out/

      - name: Ensure .nojekyll exists on gh-pages root
        run: mkdir nojekyll && touch nojekyll/.nojekyll

      - name: Deploy .nojekyll to gh-pages root
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: nojekyll
          clean: false

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: out/
          github-token: ${{ secrets.GITHUB_TOKEN }}

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: out/
          action: remove
          github-token: ${{ secrets.GITHUB_TOKEN }}
