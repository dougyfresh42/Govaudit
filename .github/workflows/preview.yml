name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.action != 'closed'
    uses: ./.github/workflows/build.yml
    with:
      base-path: "/${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.pull_request.number }}"

  deploy-preview:
    needs: build
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: out/

      - name: Ensure .nojekyll exists on gh-pages root
        run: mkdir nojekyll && touch nojekyll/.nojekyll

      - name: Deploy .nojekyll to gh-pages root
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: nojekyll
          clean: false

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: out/
          github-token: ${{ secrets.GITHUB_TOKEN }}

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: out/
          action: remove
          github-token: ${{ secrets.GITHUB_TOKEN }}
