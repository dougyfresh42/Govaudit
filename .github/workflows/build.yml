name: Build Site

on:
  workflow_call:
    inputs:
      base-path:
        description: "Next.js basePath for the deployment target (e.g. /Govaudit)"
        type: string
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync budget data
        run: npm run sync-budget

      - name: Build static site
        run: npm run build
        env:
          BASE_PATH: ${{ inputs.base-path }}

      - name: Disable Jekyll on GitHub Pages
        run: touch out/.nojekyll

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: out/
          retention-days: 1
          include-hidden-files: true
